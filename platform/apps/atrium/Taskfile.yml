version: "3"

output: prefixed

tasks:
  run:
    desc: Run API server locally
    cmds:
      - sh -c 'void_repo_root=${VOID_REPO_ROOT:-$(cd ../../../../void && pwd)}; export VOID_REPO_ROOT="$void_repo_root"; export VOID_CORE_ATRIUM_APP_DIR="$(pwd)"; exec nix develop "$void_repo_root#atrium" -c atrium_web_run'

  test:
    desc: Run frontend unit tests
    cmds:
      - (cd frontend && bun run test)

  frontend-test:
    desc: Run frontend unit tests
    cmds:
      - (cd frontend && bun run test)

  test-all:
    desc: Run all Atrium tests
    cmds:
      - task: test

  smoke:
    desc: Run smoke checks against running server
    cmds:
      - ./scripts/smoke.sh

  frontend-install:
    desc: Install frontend dependencies
    cmds:
      - (cd frontend && bun install)

  frontend-dev:
    desc: Run frontend dev server
    cmds:
      - (cd frontend && bun run dev)

  backend-dev:
    desc: Run backend dev server with env
    cmds:
      - sh -c 'void_repo_root=${VOID_REPO_ROOT:-$(cd ../../../../void && pwd)}; export VOID_REPO_ROOT="$void_repo_root"; export VOID_CORE_ATRIUM_APP_DIR="$(pwd)"; export ATRIUM_FRONTEND_DEV_URL=http://localhost:5173; exec nix develop "$void_repo_root#atrium" -c atrium_backend_dev'

  backend-fixture-dev:
    desc: Run backend dev server against the default canonical client root
    cmds:
      - sh -c 'void_repo_root=${VOID_REPO_ROOT:-$(cd ../../../../void && pwd)}; export VOID_REPO_ROOT="$void_repo_root"; export VOID_CORE_ATRIUM_APP_DIR="$(pwd)"; export ATRIUM_FRONTEND_DEV_URL=http://localhost:5173; unset DATABASE_URL; exec nix develop "$void_repo_root#atrium" -c atrium_backend_dev'

  frontend-build:
    desc: Build frontend assets into frontend dist
    cmds:
      - (cd frontend && bun install && bun run build)

  dev:
    desc: Run backend + frontend in parallel with an external database
    deps:
      - backend-dev
      - frontend-dev

  dev-start:
    desc: Run backend + frontend in parallel with an external database
    deps:
      - backend-dev
      - frontend-dev

  fixture-dev:
    desc: Run backend + frontend in parallel against the default canonical client root
    deps:
      - backend-fixture-dev
      - frontend-dev

version: "3"

output: prefixed

tasks:
  run:
    desc: Run the standalone Atrium preview host locally
    cmds:
      - sh -c 'export VOID_CORE_REPO_ROOT="$(cd ../../.. && pwd)"; export VOID_CORE_ATRIUM_APP_DIR="$(pwd)"; exec nix run ../../..#atrium-run'

  test:
    desc: Run frontend unit tests
    cmds:
      - (cd frontend && npm test)

  frontend-test:
    desc: Run frontend unit tests
    cmds:
      - (cd frontend && npm test)

  test-all:
    desc: Run all Atrium tests
    cmds:
      - task: test

  smoke:
    desc: Run smoke checks against running server
    cmds:
      - ./scripts/smoke.sh

  self-contained-smoke:
    desc: Verify the backend dev launcher works from void-core alone
    cmds:
      - ./scripts/self-contained-smoke.sh

  frontend-install:
    desc: Install frontend dependencies
    cmds:
      - (cd frontend && npm ci)

  frontend-dev:
    desc: Run frontend dev server
    cmds:
      - (cd frontend && npm run dev)

  backend-dev:
    desc: Run Rust web host with env from .env
    cmds:
      - sh -c 'export VOID_CORE_REPO_ROOT="$(cd ../../.. && pwd)"; export VOID_CORE_ATRIUM_APP_DIR="$(pwd)"; export ATRIUM_FRONTEND_DEV_URL=http://localhost:5173; exec nix run ../../..#atrium-backend-dev'

  backend-fixture-dev:
    desc: Run Rust web host against the bundled foundation client root
    cmds:
      - sh -c 'export VOID_CORE_REPO_ROOT="$(cd ../../.. && pwd)"; export VOID_CORE_ATRIUM_APP_DIR="$(pwd)"; export ATRIUM_FRONTEND_DEV_URL=http://localhost:5173; export ATRIUM_CLIENT_ROOT_PATH="$(pwd)/client-root/default"; export ATRIUM_WIDGETS_PATH="$(pwd)/widgets/default.yaml"; unset DATABASE_URL; exec nix run ../../..#atrium-backend-dev'

  frontend-build:
    desc: Build frontend assets into frontend dist
    cmds:
      - (cd frontend && npm ci && npm run build)

  dev:
    desc: Run backend + frontend in parallel with an external database
    deps:
      - backend-dev
      - frontend-dev

  dev-start:
    desc: Run backend + frontend in parallel with an external database
    deps:
      - backend-dev
      - frontend-dev

  fixture-dev:
    desc: Run backend + frontend in parallel against the default canonical client root
    deps:
      - backend-fixture-dev
      - frontend-dev

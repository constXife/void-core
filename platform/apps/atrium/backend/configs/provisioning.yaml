# Family First - Default Layout
# Three spaces: Home (family), Kids (safe content), Admin (infrastructure)

roles:
  - key: "admin"
    name: "Admin"
    permissions: ["view", "manage"]
    is_builtin: true
  - key: "user"
    name: "User"
    permissions: ["view"]
    is_builtin: true
  - key: "kids"
    name: "Kids"
    permissions: ["view"]
    is_builtin: true
  - key: "guest"
    name: "Guest"
    permissions: ["view"]
    is_builtin: true

dashboard_templates:
  - key: "home-admin"
    version: 1
    blocks:
      - id: "admin-pinned-resources"
        type: "core.resources_pinned"
        title: "Pinned resources"
        layout:
          lg:
            x: 1
            y: 1
            w: 6
            h: 2
          xs:
            order: 1
        config:
          limit: 8
          scope: "this"
          filter: "pinned"

spaces:
  # Main family space with announcements, resources, tasks, activity
  - id: "home"
    title: "Home"
    type: "audience"
    access_mode: "private"
    is_default_public_entry: false
    layout_mode: "grid"
    is_lockable: true
    groups: ["user", "admin"]
    display_config:
      description: "Семейное пространство"
      dock_visible: true
      use_dashboard: true
    public_entry: {}

  # Kids-friendly space with large tiles, safe actions, minimal text
  - id: "home-kids"
    title: "Kids"
    type: "audience"
    access_mode: "private"
    is_default_public_entry: false
    layout_mode: "hero"
    background_url: "/backgrounds/kids_night.png"
    is_lockable: true
    groups: ["kids"]
    display_config:
      description: "Детский уголок"
      dock_visible: false
      use_dashboard: false
      theme: "kids"
      background_blur: false
      background_pixelated: true
    public_entry: {}

  # Admin/infrastructure space with monitoring and devices
  - id: "home-admin"
    title: "Admin"
    type: "staff"
    access_mode: "private"
    is_default_public_entry: false
    layout_mode: "grid"
    is_lockable: true
    url: "home-admin"
    dashboard_template: "home-admin"
    groups: ["admin"]
    display_config:
      description: "Инфраструктура и мониторинг"
      dock_visible: true
      use_dashboard: true
    public_entry: {}

directory_items:
  - key: "grafana.arkham.void"
    title: "Grafana"
    description: "Метрики и наблюдаемость Arkham"
    icon_url: "https://raw.githubusercontent.com/lllllllillllllillll/Dashboard-Icons/main/png/grafana.png"
    url: "https://grafana.arkham.void"
    type: "service"
    space: "home-admin"
    pinned: true
    tags: ["monitoring", "no-details"]
    audience_groups: ["admin"]
  - key: "id.arkham.void"
    title: "Rauthy"
    description: "OIDC провайдер для Arkham"
    url: "https://id.arkham.void"
    type: "service"
    space: "home-admin"
    pinned: true
    tags: ["auth", "no-details"]
    audience_groups: ["admin"]
  - key: "mail.arkham.void"
    title: "Mailpit"
    description: "Локальный почтовый ящик для отладки"
    url: "https://mail.arkham.void"
    type: "service"
    space: "home-admin"
    pinned: true
    tags: ["mail", "no-details"]
    audience_groups: ["admin"]

services:
  - key: "s3.backups"
    title: "S3 Backups"
    description: "Object storage for backups"
    service_type: "s3"
    tags: ["storage", "backups", "details"]
    owners:
      team: "infra"
    links:
      docs: "https://docs.example.com/storage/backups"
    endpoints:
      - type: "s3"
        endpoint: "https://s3.example.local"
        bucket: "atrium-backups"
    tier: "tier-1"
    lifecycle: "active"
    classification: "internal"
    depends_on: []

service_placements:
  - service_key: "s3.backups"
    space: "home-admin"
    label: "S3"
    pinned: true
    order: 1
    group: "Storage"
    audience_groups: ["admin"]
    visible_links: ["docs"]
    primary_url: "https://s3.example.local"
    default_endpoint: "primary"
    access_path: "Request via infra"

name: Atrium Unit Tests

on:
  push:
    paths:
      - ".github/workflows/atrium-unit-tests.yml"
      - "platform/apps/atrium/backend/**"
      - "platform/apps/atrium/frontend/**"
      - "platform/apps/atrium/Taskfile.yml"
  pull_request:
    paths:
      - ".github/workflows/atrium-unit-tests.yml"
      - "platform/apps/atrium/backend/**"
      - "platform/apps/atrium/frontend/**"
      - "platform/apps/atrium/Taskfile.yml"

concurrency:
  group: atrium-unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - '.github/workflows/atrium-unit-tests.yml'
              - 'platform/apps/atrium/backend/**'
              - 'platform/apps/atrium/Taskfile.yml'
            frontend:
              - '.github/workflows/atrium-unit-tests.yml'
              - 'platform/apps/atrium/frontend/**'
              - 'platform/apps/atrium/Taskfile.yml'

  backend:
    name: Backend Unit Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/apps/atrium/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: platform/apps/atrium/backend/go.mod
          cache-dependency-path: platform/apps/atrium/backend/go.sum

      - name: Run backend unit tests
        run: go test ./...

  frontend:
    name: Frontend Unit Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/apps/atrium/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend unit tests
        run: bun run test
